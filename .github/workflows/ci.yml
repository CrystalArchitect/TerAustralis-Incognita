name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  python-checks:
    name: Python syntax + self-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax-check Python sources
        run: python -m compileall -q apps/lumina crystal-core crystalcore node tests _archive
      - name: Starline Weaver self-test
        working-directory: crystal-core
        run: python -m clementine.bridge.selftest
      - name: Pipeline self-test
        working-directory: crystal-core
        run: python -m services.selftest
      - name: Install Starline dependencies
        working-directory: crystal-core
        run: pip install -r requirements-starline.txt
      - name: Starline self-test
        working-directory: crystal-core
        run: python -m starline.selftest
      - name: RDP self-test
        working-directory: crystal-core
        run: python -m rdp.selftest
      - name: Lumina dependencies
        run: pip install -r apps/lumina/requirements.txt pytest
      - name: Lumina core tests
        run: python -m pytest apps/lumina/tests -q
