name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  docs-checks:
    name: Markdown lint + link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !node_modules
            !archive

      # Run the checker CLI directly (same invocation as local verification)
      # instead of the folder-path action: archive/ must be excluded to
      # match the lint step above - it is frozen provenance whose dead
      # links are historical facts, not defects to fix.
      - name: Link check
        run: |
          find . -name '*.md' \
            -not -path './archive/*' \
            -not -path './node_modules/*' \
            -print0 | sort -z | xargs -0 -n1 npx --yes markdown-link-check -q \
            -c .github/workflows/markdown-link-check-config.json
