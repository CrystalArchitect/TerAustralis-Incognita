name: Test Packages

on:
  push:
    branches: [ main, 'phase-*' ]
    paths:
      - 'packages/**'
      - '.github/workflows/test-packages.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - lumina
          - rdp
          - consent-transport
          - crystalbridge
          - starline
          - crystalcore-ei
          - mythos
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install package in dev mode
        run: |
          python -m pip install --upgrade pip
          cd packages/${{ matrix.package }}
          pip install -e .[dev] 2>&1 | grep -v "notice" || true
      
      - name: Syntax check
        run: |
          cd packages/${{ matrix.package }}
          python -m py_compile teraaustralis/*/*.py 2>&1 | head -20 || true
      
      - name: Run pytest if tests exist
        run: |
          cd packages/${{ matrix.package }}
          if [ -d "teraaustralis/*/tests" ]; then
            pytest teraaustralis/*/tests -v --tb=short 2>&1 | head -50
          else
            echo "No tests found for ${{ matrix.package }}"
          fi
        continue-on-error: true

  integration:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install all packages
        run: |
          python -m pip install --upgrade pip
          for pkg in packages/lumina packages/rdp packages/consent-transport packages/starline; do
            cd $pkg
            pip install -e . -q 2>&1 | grep -v "notice" || true
            cd - > /dev/null
          done
      
      - name: Test cross-package imports
        run: |
          python3 << 'PYTHON'
          tests = [
              ("Lumina", "from teraaustralis.lumina.crystalcore import Lumina"),
              ("RDP", "from teraaustralis.rdp.kernel import decide_and_record"),
              ("Consent", "from teraaustralis.consent_transport.transport import StarlineServer"),
              ("Starline", "from teraaustralis.starline import __version__"),
          ]
          
          passed = 0
          for name, stmt in tests:
              try:
                  exec(stmt)
                  print(f"✓ {name}")
                  passed += 1
              except Exception as e:
                  print(f"✗ {name}: {type(e).__name__}")
          
          print(f"\nPassed: {passed}/{len(tests)}")
          exit(0 if passed == len(tests) else 1)
          PYTHON
