[build-system]
requires = ["setuptools>=65", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "teraaustralis-rdp"
version = "1.0.0"
description = "Record kernel with tamper-evident journal and explainable decision engine"
readme = "README.md"
license = {text = "AGPL-3.0-or-later"}
authors = [{name = "CrystalArchitect"}]
requires-python = ">=3.10"

dependencies = [
    "jsonschema>=4.0",
]

optional-dependencies = {
    dev = [
        "pytest>=7.0",
        "pytest-cov>=4.0",
    ]
}

[project.urls]
repository = "https://github.com/CrystalArchitect/teraaustralis-incognita"
documentation = "https://teraaustralis.dev/rdp"

[tool.setuptools]
packages = ["teraaustralis.rdp"]
