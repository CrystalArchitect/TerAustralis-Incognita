[build-system]
requires = ["setuptools>=65", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "teraaustralis-mythos"
version = "1.0.0"
description = "CrystalCore universe: canon, narrative, and visual art"
readme = "README.md"
license = {text = "CC-BY-NC-ND-4.0"}
authors = [{name = "CrystalArchitect"}]
requires-python = ">=3.8"

dependencies = []

[project.optional-dependencies]
dev = [
    "pillow>=9.0",
]

[project.urls]
repository = "https://github.com/CrystalArchitect/teraaustralis-incognita"
documentation = "https://teraaustralis.dev/mythos"

[tool.setuptools]
packages = ["teraaustralis.mythos"]

[tool.setuptools.package-data]
"teraaustralis.mythos" = ["art/*", "content/*", "*.md"]
