[build-system]
requires = ["setuptools>=65", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "teraaustralis-consent"
version = "1.0.0"
description = "P2P sovereign memory exchange with Noise Protocol and consent model"
readme = "README.md"
license = {text = "AGPL-3.0-or-later"}
authors = [{name = "CrystalArchitect"}]
requires-python = ">=3.10"

dependencies = [
    "cryptography>=39.0",
    "asyncio>=3.4.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.20",
    "pytest-cov>=4.0",
]

[project.urls]
repository = "https://github.com/CrystalArchitect/teraaustralis-incognita"
documentation = "https://teraaustralis.dev/consent"

[tool.setuptools]
packages = ["teraaustralis.consent_transport"]
