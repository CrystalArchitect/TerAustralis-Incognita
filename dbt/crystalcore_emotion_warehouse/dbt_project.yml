name: 'crystalcore_emotion_warehouse'
version: '1.0.0'
config-version: 2
profile: 'crystalcore'

model-paths: ['models']
analysis-paths: ['analysis']
test-paths: ['tests']
data-paths: ['data']
macro-paths: ['macros']
snapshot-paths: ['snapshots']
target-path: 'target'
clean-targets:
  - 'target'
  - 'dbt_packages'

models:
  crystalcore_emotion_warehouse:
    materialization: table
    staging:
      +materialized: view
      +tags: ['staging']
    marts:
      core:
        +materialized: table
        +tags: ['core']
      active_learning:
        +materialized: table
        +tags: ['active_learning']

seeds:
  +quote_columns: false

vars:
  emotion_labels:
    - admiration
    - amusement
    - anger
    - annoyance
    - approval
    - caring
    - confusion
    - curiosity
    - desire
    - disappointment
    - disapproval
    - disgust
    - embarrassment
    - excitement
    - fear
    - gratitude
    - grief
    - joy
    - love
    - nervousness
    - optimism
    - pride
    - realization
    - relief
    - remorse
    - sadness
    - surprise
    - neutral

  confidence_threshold: 0.65
  entropy_threshold: 0.55
  margin_threshold: 0.15
