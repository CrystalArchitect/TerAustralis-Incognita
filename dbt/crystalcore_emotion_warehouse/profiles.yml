crystalcore:
  outputs:
    dev:
      type: duckdb
      path: '/tmp/crystalcore_emotion_warehouse.duckdb'
      threads: 4
      timeout_seconds: 300

    prod:
      type: bigquery
      method: service-account
      project: 'crystalcore-emotion-warehouse'
      dataset: 'emotion_detection'
      keyfile: '~/.crystalcore/bigquery_credentials.json'
      timeout_seconds: 300
      priority: interactive
      retries: 1
      location: 'US'
      threads: 4

  target: dev
